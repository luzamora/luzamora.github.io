<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luzamora | Home</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@700&display=swap" rel="stylesheet">
</head>
<body class="no-scroll">

    <div class="intro-screen" id="introScreen">
        <span class="encendido" id="tituloAnimado">----------</span>
    </div>

    <div id="contenido" style="display: none;">
        
        <header class="main-header">
            <div class="header-left">
                <a href="https://www.chiskey.es" target="_blank">
                    <img src="https://res.cloudinary.com/daxumuyx8/image/upload/v1762452002/Recurso_1t5_e9fkcy.png" alt="Logo Chiskey" class="logo-chiskey">
                </a>
            </div>

            <button class="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <nav class="nav-menu">
                <ul>
                    <li><a href="/">INICIO</a></li>
                    <li><a href="/proyectos/">PROYECTOS</a></li>
                    <li><a href="/cv/">CV</a></li>
                    <li><a href="/contacto/">CONTACTO</a></li>
                </ul>
                <div class="nav-socials">
                    <a href="https://linkedin.com/in/tuusuario" target="_blank">LINKEDIN</a>
                    <a href="https://instagram.com/luzamora__" target="_blank">INSTAGRAM</a>
                </div>
            </nav>

            <div class="header-right desktop-socials">
                <a href="https://linkedin.com/in/tuusuario" target="_blank">
                    <img src="https://res.cloudinary.com/daxumuyx8/image/upload/v1762451986/linkedin_jeajvl.png" alt="LinkedIn">
                </a>
                <a href="https://instagram.com/luzamora__" target="_blank">
                    <img src="https://res.cloudinary.com/daxumuyx8/image/upload/v1762451986/logotipo-de-instagram_b3yno8.png" alt="Instagram">
                </a>
            </div>
        </header>

        <main class="landing-hero">
            <video autoplay muted loop playsinline class="bg-video">
                <source src="https://res.cloudinary.com/daxumuyx8/video/upload/v1762195090/analog_aesthetic_cinematic_blurred_lights_long_exposure_motion_dark_background_0a0a0a_warm_orange_b_jzs8xm31v8fhxekkf2rx_1_ugtoka.mp4" type="video/mp4">
            </video>
            
            <div class="hero-overlay">
                <img src="https://res.cloudinary.com/daxumuyx8/image/upload/v1762452002/luzamora_l1s5pz.png" alt="Luzamora Logo" class="main-logo-landing">
                <a href="/contacto/" class="btn-ver-mas btn-landing">// TRABAJA CONMIGO</a>
            </div>
        </main>

        <footer class="main-footer footer-fixed">
            <p>LUZAMORA <span class="copyright-symbol">&copy;</span> 2025 ALL RIGHTS RESERVED</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        // Lógica simple para el menú hamburguesa
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.nav-menu');
        toggle.addEventListener('click', () => {
            nav.classList.toggle('active');
            toggle.classList.toggle('is-active');
        });
    </script>
</body>
</html>
